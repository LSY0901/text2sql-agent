<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2SQL 数据分析助手-agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 14px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            color: #fff;
        }

        .message.user .avatar { background: #4f46e5; }
        .message.ai .avatar { background: #16a34a; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: calc(100% - 50px);
        }

        .message.user .bubble {
            background: #4f46e5;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: #fff;
            color: #333;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 6px;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #999;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .error-text { color: #dc2626; }

        .input-area {
            background: #fff;
            border-top: 1px solid #e5e5e5;
            padding: 16px;
        }

        .input-wrapper {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            min-height: 46px;
            max-height: 160px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #4f46e5; }

        button#sendBtn {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 12px;
            background: #4f46e5;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        button#sendBtn:hover { background: #4338ca; }
        button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

        .welcome {
            text-align: center;
            color: #999;
            margin: auto;
            font-size: 15px;
            line-height: 1.8;
        }

        .welcome h2 { color: #555; font-size: 20px; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>Text2SQL 数据分析助手-agent</header>

<div class="chat-container" id="chatContainer">
    <div class="welcome">
        <h2>你好，我是数据分析助手</h2>
        <div>输入问题，我将查询数据库并为你分析回答</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="输入你的问题..." autofocus></textarea>
        <button id="sendBtn" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    // ========== 配置区 ==========
    // 如果从 IntelliJ 直接打开(端口63342)，需要指定后端地址
    // 如果通过 Spring Boot 访问(localhost:8087/chat.html)，留空即可自动使用当前域名
    const API_BASE = 'http://localhost:8081';  // 例: 'http://localhost:8087'
    // ============================

    const API_BASE_URL = API_BASE.replace(/\/+$/, '');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let isStreaming = false;

    if (API_BASE) {
        const tip = document.createElement('div');
        tip.style.cssText = 'text-align:center;font-size:12px;color:#999;padding:4px;background:#fff3cd;border-bottom:1px solid #ffc107;';
        tip.textContent = `后端地址: ${API_BASE_URL}`;
        document.body.prepend(tip);
    }

    function removeWelcome() {
        const w = chatContainer.querySelector('.welcome');
        if (w) w.remove();
    }

    function addMessage(role, text) {
        removeWelcome();
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="avatar">${role === 'user' ? '你' : 'AI'}</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        chatContainer.appendChild(div);
        scrollToBottom();
        return div.querySelector('.bubble');
    }

    function addStreamingMessage() {
        removeWelcome();
        const div = document.createElement('div');
        div.className = 'message ai';
        div.innerHTML = `
            <div class="avatar">AI</div>
            <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
        `;
        chatContainer.appendChild(div);
        scrollToBottom();
        return div.querySelector('.bubble');
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;
        userInput.value = '';
        userInput.style.height = 'auto';

        addMessage('user', text);

        const bubble = addStreamingMessage();
        let fullText = '';

        try {
            const url = `${API_BASE_URL}/aiChat/text2SqlAgentTools?question=${encodeURIComponent(text)}`;
            const resp = await fetch(url);

            if (!resp.ok) {
                const errText = await resp.text().catch(() => '');
                bubble.innerHTML = `<span class="error-text">请求失败: ${resp.status} ${resp.statusText}\n${escapeHtml(errText)}</span>`;
                isStreaming = false;
                sendBtn.disabled = false;
                return;
            }

            const contentType = resp.headers.get('content-type') || '';

            if (contentType.includes('text/event-stream')) {
                // SSE 流：逐行解析 data: 前缀
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split('\n\n');
                    buffer = chunks.pop();

                    for (const chunk of chunks) {
                        for (const line of chunk.split('\n')) {
                            if (line.startsWith('data:')) {
                                const data = line.slice(5).trim();
                                if (data === '[DONE]') continue;
                                fullText += data;
                            } else if (line.startsWith(':')) {
                                // SSE comment，忽略
                            } else if (line.trim()) {
                                fullText += line;
                            }
                        }
                    }

                    bubble.textContent = fullText || '思考中...';
                    scrollToBottom();
                }

                // 处理 buffer 中剩余数据
                if (buffer.trim()) {
                    for (const line of buffer.split('\n')) {
                        if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            if (data !== '[DONE]') fullText += data;
                        } else if (!line.startsWith(':') && line.trim()) {
                            fullText += line;
                        }
                    }
                    bubble.textContent = fullText;
                }
            } else {
                // 普通文本响应
                fullText = await resp.text();
                bubble.textContent = fullText || '(无响应内容)';
            }

            if (!fullText) {
                bubble.textContent = '(无响应内容)';
            }

        } catch (e) {
            console.error('请求错误:', e);
            bubble.innerHTML = `<span class="error-text">连接失败: ${escapeHtml(e.message)}\n\n检查后端是否运行，以及 API_BASE 配置是否正确</span>`;
        } finally {
            isStreaming = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });

    userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
