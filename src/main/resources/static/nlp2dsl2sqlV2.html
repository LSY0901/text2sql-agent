<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP2DSL2SQL 数据分析助手-agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 14px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            color: #fff;
        }

        .message.user .avatar { background: #4f46e5; }
        .message.ai .avatar { background: #16a34a; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: calc(100% - 50px);
        }

        .message.user .bubble {
            background: #4f46e5;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.ai .bubble {
            background: #fff;
            color: #333;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 6px;
            white-space: normal;
        }

        .answer-section {
            margin-bottom: 14px;
        }

        .answer-section:last-child {
            margin-bottom: 0;
        }

        .answer-label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .answer-intent {
            display: inline-block;
            background: #eef2ff;
            color: #4338ca;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .answer-sql {
            margin: 0;
            padding: 10px 12px;
            background: #f3f4f6;
            border-radius: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            color: #111827;
            overflow-x: auto;
        }

        .answer-conclusion {
            color: #1f2937;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #999;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .error-text { color: #dc2626; white-space: pre-wrap; }

        .input-area {
            background: #fff;
            border-top: 1px solid #e5e5e5;
            padding: 16px;
        }

        .input-wrapper {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            min-height: 46px;
            max-height: 160px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: #4f46e5; }

        button#sendBtn {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 12px;
            background: #4f46e5;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }

        button#sendBtn:hover { background: #4338ca; }
        button#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

        .welcome {
            text-align: center;
            color: #999;
            margin: auto;
            font-size: 15px;
            line-height: 1.8;
        }

        .welcome h2 { color: #555; font-size: 20px; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>NLP2DSL2SQL 数据分析助手-agent</header>

<div class="chat-container" id="chatContainer">
    <div class="welcome">
        <h2>你好，我是数据分析助手</h2>
        <div>输入问题，我将查询数据库并为你分析回答</div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="输入你的问题..." autofocus></textarea>
        <button id="sendBtn" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    // ========== 配置区 ==========
    const API_BASE = 'http://localhost:8081';
    // ============================

    const API_BASE_URL = API_BASE.replace(/\/+$/, '');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let isStreaming = false;

    if (API_BASE) {
        const tip = document.createElement('div');
        tip.style.cssText = 'text-align:center;font-size:12px;color:#999;padding:4px;background:#fff3cd;border-bottom:1px solid #ffc107;';
        tip.textContent = `后端地址: ${API_BASE_URL}`;
        document.body.prepend(tip);
    }

    function removeWelcome() {
        const w = chatContainer.querySelector('.welcome');
        if (w) w.remove();
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    /**
     * 解析后端「意图 / SQL / 结论」分段文本。
     */
    function parseAnswerSections(text) {
        const result = { intent: '', sql: '', conclusion: '', raw: text };
        if (!text) {
            return result;
        }

        const intentMatch = text.match(/意图[:：]\s*([^\n]+)/);
        if (intentMatch) {
            result.intent = intentMatch[1].trim();
        }

        const sqlMatch = text.match(/SQL[:：]\s*\n?([\s\S]*?)(?:\n\s*结论[:：]|$)/);
        if (sqlMatch) {
            result.sql = sqlMatch[1].trim();
        }

        const conclusionMatch = text.match(/结论[:：]\s*\n?([\s\S]*)$/);
        if (conclusionMatch) {
            result.conclusion = conclusionMatch[1].trim();
        }

        return result;
    }

    /**
     * 将流式文本渲染为结构化卡片。
     */
    function renderAiBubble(bubble, text) {
        if (!text) {
            bubble.textContent = '思考中...';
            return;
        }

        const sections = parseAnswerSections(text);
        const hasStructure = sections.intent || sections.sql || sections.conclusion;

        if (!hasStructure) {
            bubble.style.whiteSpace = 'pre-wrap';
            bubble.textContent = text;
            return;
        }

        let html = '';
        if (sections.intent) {
            html += `
                <div class="answer-section">
                    <div class="answer-label">意图</div>
                    <span class="answer-intent">${escapeHtml(sections.intent)}</span>
                </div>`;
        }
        if (sections.sql) {
            html += `
                <div class="answer-section">
                    <div class="answer-label">SQL</div>
                    <pre class="answer-sql">${escapeHtml(sections.sql)}</pre>
                </div>`;
        }
        if (sections.conclusion) {
            html += `
                <div class="answer-section">
                    <div class="answer-label">结论</div>
                    <div class="answer-conclusion">${escapeHtml(sections.conclusion)}</div>
                </div>`;
        } else if (!sections.sql && text.includes('结论')) {
            // 结论还在流式产生中，先占位
            html += `
                <div class="answer-section">
                    <div class="answer-label">结论</div>
                    <div class="answer-conclusion">生成中...</div>
                </div>`;
        }

        bubble.innerHTML = html || escapeHtml(text);
    }

    function addMessage(role, text) {
        removeWelcome();
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="avatar">${role === 'user' ? '你' : 'AI'}</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        chatContainer.appendChild(div);
        scrollToBottom();
        return div.querySelector('.bubble');
    }

    function addStreamingMessage() {
        removeWelcome();
        const div = document.createElement('div');
        div.className = 'message ai';
        div.innerHTML = `
            <div class="avatar">AI</div>
            <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
        `;
        chatContainer.appendChild(div);
        scrollToBottom();
        return div.querySelector('.bubble');
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    /**
     * 从单个 SSE event 中提取 data 文本。
     * 同一事件内多行 data: 需用 \\n 拼接（SSE 规范）。
     */
    function extractSseEventData(eventChunk) {
        const dataLines = [];
        for (const line of eventChunk.split('\n')) {
            if (!line.startsWith('data:')) {
                continue;
            }
            // SSE: "data:" 后最多一个可选空格，不能 trim 整行（会吃掉刻意空行）
            let data = line.slice(5);
            if (data.startsWith(' ')) {
                data = data.slice(1);
            }
            if (data === '[DONE]') {
                continue;
            }
            dataLines.push(data);
        }
        return dataLines.join('\n');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;
        userInput.value = '';
        userInput.style.height = 'auto';

        addMessage('user', text);

        const bubble = addStreamingMessage();
        let fullText = '';

        try {
            const url = `${API_BASE_URL}/aiChat/nlp2Dsl2SqlAgentV2?question=${encodeURIComponent(text)}`;
            const resp = await fetch(url);

            if (!resp.ok) {
                const errText = await resp.text().catch(() => '');
                bubble.innerHTML = `<span class="error-text">请求失败: ${resp.status} ${resp.statusText}\n${escapeHtml(errText)}</span>`;
                isStreaming = false;
                sendBtn.disabled = false;
                return;
            }

            const contentType = resp.headers.get('content-type') || '';

            if (contentType.includes('text/event-stream')) {
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const chunks = buffer.split('\n\n');
                    buffer = chunks.pop();

                    for (const chunk of chunks) {
                        const piece = extractSseEventData(chunk);
                        if (piece) {
                            fullText += piece;
                        }
                    }

                    renderAiBubble(bubble, fullText || '思考中...');
                    scrollToBottom();
                }

                if (buffer.trim()) {
                    const piece = extractSseEventData(buffer);
                    if (piece) {
                        fullText += piece;
                    }
                }
                renderAiBubble(bubble, fullText || '(无响应内容)');
            } else {
                fullText = await resp.text();
                renderAiBubble(bubble, fullText || '(无响应内容)');
            }

        } catch (e) {
            console.error('请求错误:', e);
            bubble.innerHTML = `<span class="error-text">连接失败: ${escapeHtml(e.message)}\n\n检查后端是否运行，以及 API_BASE 配置是否正确</span>`;
        } finally {
            isStreaming = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });

    userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
